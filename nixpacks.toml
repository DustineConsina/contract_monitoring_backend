[setup]
aptPkgs = ["zip", "unzip"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "composer install --no-interaction --optimize-autoloader",
  "npm ci"
]

[phases.build]
dependsOn = ["install"]
cmds = [
  "npm run build",
  "chmod +x start.sh"
]

[phases.deploy]
dependsOn = ["build"]
cmds = [
  "php artisan migrate --force || true"
]

[[processes]]
type = "web"
command = "bash start.sh"
