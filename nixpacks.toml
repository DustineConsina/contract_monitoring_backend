[buildConfig]
packageManager = "php"

[phases.setup]
nixpacksFiles = ["nixpacks.toml"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction", "npm ci"]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache && chmod -R a+rw storage",
  "php artisan config:cache",
  "php artisan event:cache", 
  "php artisan route:cache",
  "php artisan view:cache"
]

[phases.deploy]
cmds = ["php artisan migrate --force"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=8000"
